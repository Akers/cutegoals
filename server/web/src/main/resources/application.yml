app:
  name: CuteGoals
  timezone: Asia/Shanghai
  audit:
    type: ${APP_AUDIT_TYPE:memory}   # "memory" for InMemoryAuditService, "db" for DatabaseAuditService
  auth:
    jwt:
      secret: ${CUTEGOALS_JWT_SECRET:changeit-changeit-changeit-changeit-changeit}
      access-expiry-minutes: 15
      refresh-expiry-days: 7
    sms:
      enabled: false

spring:
  application:
    name: CuteGoals
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:35432}/${PG_DATABASE:cutegoals}?currentSchema=${PG_SCHEMA:cutegoals}
    username: ${PG_USER:cutegoals}
    password: ${PG_PASSWORD:cutegoals}
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${PG_SCHEMA:cutegoals}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

server:
  port: ${PORT:8080}

logging:
  level:
    com.cutegoals: DEBUG
