app:
  name: CuteGoals
  timezone: Asia/Shanghai
  auth:
    jwt:
      secret: ${CUTEGOALS_JWT_SECRET:changeit-changeit-changeit-changeit-changeit}
      access-expiry-minutes: 15
      refresh-expiry-days: 7
    sms:
      enabled: false

spring:
  application:
    name: CuteGoals
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:cutegoals}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

server:
  port: ${PORT:8080}

logging:
  level:
    com.cutegoals: DEBUG
