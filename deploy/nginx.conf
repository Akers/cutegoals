# =============================================================================
# CuteGoals 2.0 — Nginx 配置（Docker Compose 环境）
# 提供 HTTPS 终结 + 安全头 + API 反向代理到后端服务
# 开发模式：仅 HTTP，绑定 localhost
# 生产模式：强制 HTTPS，配置安全头
# =============================================================================

upstream backend {
    server mit-modelide-core-server:8080;
}

# ── 生产 HTTPS 配置 ────────────────────────────────────────────────────
# 证书文件通过 Docker 卷挂载到 /etc/nginx/ssl/
server {
    listen 443 ssl http2;
    server_name ${APP_DOMAIN};

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── 前端静态文件 ──────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA 深度链接回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存（Vite 产物含内容哈希）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API 反向代理 ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── 安全标头（通用，对所有响应生效）────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content-Security-Policy（根据实际部署域名调整）
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
}

# ── HTTP → HTTPS 强制跳转（生产模式） ──────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS 服务（生产模式） ────────────────────────────────────────────
# 此 server block 在上面已定义，所有请求由 HTTPS 处理
