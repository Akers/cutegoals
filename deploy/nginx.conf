# CuteGoals SPA — Nginx configuration snippet
# Place this in your nginx sites-available/ and symlink to sites-enabled/.
# Adjust root path and server_name to match your deployment.

server {
    listen 80;
    server_name cutegoals.local;

    root /var/www/cutegoals/dist;
    index index.html;

    # ── SPA deep-link fallback ──────────────────────────────────────────
    # Serve index.html for any URL that doesn't match an existing file or
    # directory. This ensures that routes like /admin, /parent, /child (and
    # their sub-routes) work correctly when the user refreshes the page or
    # navigates directly to a deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets with long-term caching ────────────────────────────
    # Vite-generated asset files include content hashes in their filename,
    # so they can be cached indefinitely.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers (recommended) ──────────────────────────────────
    # Uncomment and adjust for your environment:
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
