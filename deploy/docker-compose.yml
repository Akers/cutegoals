# =============================================================================
# CuteGoals 2.0 — Docker Compose 编排（生产环境）
# 使用方式：
#   cp deploy/.env.template .env   # 编辑 .env 填入实际值
#   ./deploy/build.sh up            # 或
#   docker compose --env-file .env -f deploy/docker-compose.yml up -d
# =============================================================================

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  mit-modelide-core-postgres:
    image: postgres:16-alpine
    container_name: mit-modelide-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-cutegoals}
      POSTGRES_USER: ${PG_USER:-cutegoals}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PG_SCHEMA: ${PG_SCHEMA:-cutegoals}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-cutegoals} -d ${PG_DATABASE:-cutegoals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mit-modelide-core-network

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  mit-modelide-core-redis:
    image: redis:7-alpine
    container_name: mit-modelide-core-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mit-modelide-core-network

  # ── 后端服务：Spring Boot ────────────────────────────────────────────────
  mit-modelide-core-server:
    image: mit-modelide-core-server:${APP_VERSION:-latest}
    container_name: mit-modelide-core-server
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # PostgreSQL 连接
      PG_HOST: mit-modelide-core-postgres
      PG_PORT: 5432
      PG_DATABASE: ${PG_DATABASE:-cutegoals}
      PG_USER: ${PG_USER:-cutegoals}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_SCHEMA: ${PG_SCHEMA:-cutegoals}
      # Redis 连接
      SPRING_DATA_REDIS_HOST: mit-modelide-core-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 应用配置
      JWT_SECRET: ${JWT_SECRET}
      CUTEGOALS_JWT_SECRET: ${JWT_SECRET}
      INIT_TOKEN: ${INIT_TOKEN}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_PRODUCTION: ${APP_PRODUCTION:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # 短信服务（可选）
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_ACCESS_KEY: ${SMS_ACCESS_KEY:-}
      SMS_ACCESS_SECRET: ${SMS_ACCESS_SECRET:-}
    volumes:
      - server_logs:/app/logs
    depends_on:
      mit-modelide-core-postgres:
        condition: service_healthy
      mit-modelide-core-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mit-modelide-core-network

  # ── 前端 + Nginx 反向代理 ────────────────────────────────────────────────
  mit-modelide-core-nginx:
    image: mit-modelide-core-nginx:${APP_VERSION:-latest}
    container_name: mit-modelide-core-nginx
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mit-modelide-core-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mit-modelide-core-network

  # ── 备份 Sidecar ──────────────────────────────────────────────────────────
  mit-modelide-core-backup:
    image: postgres:16-alpine
    container_name: mit-modelide-core-backup
    restart: unless-stopped
    environment:
      PG_HOST: mit-modelide-core-postgres
      PG_PORT: 5432
      PG_DATABASE: ${PG_DATABASE:-cutegoals}
      PG_USER: ${PG_USER:-cutegoals}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_SCHEMA: ${PG_SCHEMA:-cutegoals}
      BACKUP_DIR: ${BACKUP_DIR:-/backup}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_RETENTION_WEEKS: ${BACKUP_RETENTION_WEEKS:-4}
      BACKUP_RETENTION_MONTHS: ${BACKUP_RETENTION_MONTHS:-3}
      APP_VERSION: ${APP_VERSION:-latest}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      SERVER_URL: http://mit-modelide-core-server:8080
    volumes:
      - backup_data:/backup
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backup/prune.sh:/usr/local/bin/prune.sh:ro
    depends_on:
      mit-modelide-core-postgres:
        condition: service_healthy
      mit-modelide-core-server:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'backup-sidecar ready' &&
        echo '0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    networks:
      - mit-modelide-core-network

volumes:
  pg_data:
    name: mit-modelide-core-pg-data
  redis_data:
    name: mit-modelide-core-redis-data
  backup_data:
    name: mit-modelide-core-backup-data
  server_logs:
    name: mit-modelide-core-server-logs

networks:
  mit-modelide-core-network:
    name: mit-modelide-core-network
    driver: bridge
