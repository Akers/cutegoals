# =============================================================================
# CuteGoals 2.0 — Docker Compose 编排
# 使用方式：
#   cp deploy/.env.template .env   # 编辑 .env 填入实际值
#   ./deploy/build.sh up            # 或
#   docker compose --env-file .env -f deploy/docker-compose.yml up -d
# =============================================================================

version: "3.9"

services:
  # ── MySQL 8 ─────────────────────────────────────────────────────────────
  mit-modelide-core-mysql:
    image: mysql:8.0
    container_name: mit-modelide-core-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cutegoals}
      MYSQL_USER: ${MYSQL_USER:-cutegoals}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mit-modelide-core-network

  # ── Redis 7 ─────────────────────────────────────────────────────────────
  mit-modelide-core-redis:
    image: redis:7-alpine
    container_name: mit-modelide-core-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mit-modelide-core-network

  # ── 后端服务：Spring Boot ────────────────────────────────────────────────
  mit-modelide-core-server:
    image: mit-modelide-core-server:${APP_VERSION:-latest}
    container_name: mit-modelide-core-server
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mit-modelide-core-mysql:3306/${MYSQL_DATABASE:-cutegoals}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-cutegoals}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: mit-modelide-core-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INIT_TOKEN: ${INIT_TOKEN}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_ACCESS_KEY: ${SMS_ACCESS_KEY:-}
      SMS_ACCESS_SECRET: ${SMS_ACCESS_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mit-modelide-core-mysql:
        condition: service_healthy
      mit-modelide-core-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mit-modelide-core-network

  # ── 前端服务：Nginx + SPA ───────────────────────────────────────────────
  mit-modelide-core-nginx:
    image: mit-modelide-core-nginx:${APP_VERSION:-latest}
    container_name: mit-modelide-core-nginx
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mit-modelide-core-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mit-modelide-core-network

volumes:
  mysql_data:
    name: mit-modelide-core-mysql-data
  redis_data:
    name: mit-modelide-core-redis-data

networks:
  mit-modelide-core-network:
    name: mit-modelide-core-network
    driver: bridge
