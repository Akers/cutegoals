# =============================================================================
# CuteGoals 2.0 — CI 基线流水线
# 触发条件：
#   - push 到 main / master 分支 → 完整流水线（全阶段覆盖）
#   - pull request → 增量检查（lint + 测试 + OpenSpec 验证）
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 镜像标签前缀
  REGISTRY_PREFIX: mit-modelide-core

defaults:
  run:
    shell: bash

jobs:
  # ── 阶段 1：OpenSpec 验证 ───────────────────────────────────────────────
  openspec-validate:
    name: OpenSpec 验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: 验证 OpenSpec 变更与规约
        run: openspec validate --all

  # ── 阶段 2：后端构建与测试 ──────────────────────────────────────────────
  backend:
    name: 后端构建与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Maven 编译与测试
        run: mvn verify -B -q
        working-directory: server

  # ── 阶段 3：前端 Lint 与测试 ────────────────────────────────────────────
  frontend:
    name: 前端 Lint 与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: web

      - name: ESLint 检查
        run: npm run lint
        working-directory: web

      - name: 运行单元测试
        run: npm test
        working-directory: web

  # ── 阶段 4：GitHub Actions YAML 语法检查 ───────────────────────────────
  workflow-validate:
    name: 工作流语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 actionlint
        run: |
          bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 验证工作流 YAML
        run: actionlint -color

  # ── 阶段 5：Docker 镜像构建检查 ─────────────────────────────────────────
  docker-build:
    name: Docker 镜像构建检查
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端 Docker 镜像（dry-run，仅检查）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          push: false
          tags: ${{ env.REGISTRY_PREFIX }}-server:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建前端 Nginx Docker 镜像（dry-run，仅检查）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.nginx
          push: false
          tags: ${{ env.REGISTRY_PREFIX }}-nginx:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
